services:
  daniu:
    build: .
    container_name: bull-daniu
    restart: unless-stopped
    ports:
      - "18888:8000"
    env_file: .env
    volumes:
      - ./workspace:/app/workspace
      - daniu-data:/app/data
      - daniu-claude:/root/.claude
    networks:
      - default
      - agents-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  daniu-data:
  daniu-claude:

networks:
  agents-net:
    external: true
