services:
  bot:
    build: .
    image: raise-a-bull:latest
    container_name: bull-${BOT_NAME}
    restart: unless-stopped
    ports:
      - "${BOT_PORT}:8000"
    env_file: ${BOT_ENV_FILE}
    volumes:
      - ${WORKSPACE_PATH}:/app/workspace
      - bot-claude:/home/bull/.claude
    networks:
      - default
      - agents-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  bot-claude:

networks:
  agents-net:
    external: true
