<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
body { width: 1080px; height: 1920px; overflow: hidden; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1920px;background:#F3EFE9;font-family:'Noto Sans TC',sans-serif;">

  <!-- 紙張質感 -->
  <div style="position:absolute;inset:0;opacity:0.05;pointer-events:none;z-index:998;background-image:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 600 600%22%3E%3Cfilter id=%22a%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%22.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23a)%22/%3E%3C/svg%3E');background-repeat:repeat;background-size:200px"></div>

  <!-- 頂部留白區（IG 安全區） -->
  <div style="height:280px"></div>

  <!-- 標籤 -->
  <div style="padding:0 80px;margin-bottom:24px;">
    <span style="display:inline-block;padding:8px 28px;border:2px solid #541E17;font-size:20px;font-weight:500;letter-spacing:6px;color:#541E17;">{{TAG}}</span>
  </div>

  <!-- 金色裝飾線 -->
  <div style="padding:0 80px;margin-bottom:32px;">
    <div style="width:80px;height:2px;background:#C9821A;"></div>
  </div>

  <!-- 主標題 -->
  <div style="padding:0 80px;margin-bottom:24px;">
    <h1 style="font-family:'Noto Serif TC',serif;font-size:76px;font-weight:700;color:#1C1208;line-height:1.2;letter-spacing:2px;">{{TITLE}}</h1>
  </div>

  <!-- 副標題 -->
  <div style="padding:0 80px;margin-bottom:48px;">
    <p style="font-size:32px;font-weight:300;color:#2D2D2D;line-height:1.6;">{{SUBTITLE}}</p>
  </div>

  <!-- 酒紅分隔線 -->
  <div style="padding:0 80px;margin-bottom:48px;">
    <div style="width:60px;height:4px;background:#541E17;"></div>
  </div>

  <!-- 活動資訊 -->
  <div style="padding:0 80px;">
    <div style="display:flex;margin-bottom:28px;align-items:baseline;">
      <div style="width:100px;font-size:20px;font-weight:500;color:#C9821A;letter-spacing:4px;">日期</div>
      <div style="font-size:32px;font-weight:500;color:#1C1208;">{{DATE}}</div>
    </div>
    <div style="display:flex;margin-bottom:28px;align-items:baseline;">
      <div style="width:100px;font-size:20px;font-weight:500;color:#C9821A;letter-spacing:4px;">時間</div>
      <div style="font-size:32px;font-weight:500;color:#1C1208;">{{TIME}}</div>
    </div>
    <div style="display:flex;margin-bottom:28px;align-items:baseline;">
      <div style="width:100px;font-size:20px;font-weight:500;color:#C9821A;letter-spacing:4px;">地點</div>
      <div style="font-size:32px;font-weight:500;color:#1C1208;">{{LOCATION}}</div>
    </div>
  </div>

  <!-- 說明文字 -->
  <div style="padding:40px 80px 0;">
    <p style="font-size:28px;font-weight:400;color:#2D2D2D;line-height:1.8;">{{DESCRIPTION}}</p>
  </div>

  <!-- 底部品牌區 -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:280px;background:#541E17;padding:60px 80px;display:flex;align-items:center;justify-content:space-between;">
    <div>
      <div style="font-family:'Noto Serif TC',serif;font-weight:700;font-size:36px;color:#F3EFE9;letter-spacing:4px;">{{brand_tagline}}</div>
      <div style="font-size:16px;color:rgba(243,239,233,0.7);letter-spacing:6px;margin-top:8px;">{{brand_name}}</div>
    </div>
    <div style="width:2px;height:60px;background:#C9821A;"></div>
    <div style="text-align:right;">
      <div style="font-size:20px;color:rgba(243,239,233,0.7);letter-spacing:2px;">Follow us</div>
      <div style="font-size:24px;color:#F3EFE9;margin-top:4px;">{{social_handle}}</div>
    </div>
  </div>

</div>
</body>
</html>
