<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
body { width: 1080px; height: 1920px; overflow: hidden; }
</style>
</head>
<body>
<div style="position:relative;width:1080px;height:1920px;font-family:'Noto Sans TC',sans-serif;">

  <!-- 背景照片 -->
  <div style="position:absolute;inset:0;background:url('{{PHOTO_URL}}') center/cover;"></div>

  <!-- 漸層遮罩（上淺下深） -->
  <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(28,18,8,0.15) 0%,rgba(28,18,8,0.3) 35%,rgba(28,18,8,0.75) 55%,#1C1208 70%);"></div>

  <!-- 紙張質感 -->
  <div style="position:absolute;inset:0;opacity:0.05;pointer-events:none;z-index:998;background-image:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 600 600%22%3E%3Cfilter id=%22a%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%22.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23a)%22/%3E%3C/svg%3E');background-repeat:repeat;background-size:200px"></div>

  <!-- 內容區（下半部） -->
  <div style="position:absolute;bottom:280px;left:0;right:0;padding:0 80px;">

    <!-- 金色裝飾線 -->
    <div style="width:80px;height:2px;background:#C9821A;margin-bottom:24px;"></div>

    <!-- 標籤 -->
    <div style="margin-bottom:20px;">
      <span style="display:inline-block;padding:6px 20px;border:1.5px solid #C9821A;font-size:18px;font-weight:500;letter-spacing:4px;color:#C9821A;">{{TAG}}</span>
    </div>

    <!-- 主標題 -->
    <h1 style="font-family:'Noto Serif TC',serif;font-size:64px;font-weight:700;color:#F3EFE9;line-height:1.2;letter-spacing:2px;margin-bottom:20px;">{{TITLE}}</h1>

    <!-- 副標題 -->
    <p style="font-size:30px;font-weight:300;color:rgba(243,239,233,0.8);line-height:1.5;margin-bottom:32px;">{{SUBTITLE}}</p>

    <!-- 分隔線 -->
    <div style="width:60px;height:3px;background:#541E17;margin-bottom:24px;"></div>

    <!-- 說明文字 -->
    <p style="font-size:26px;font-weight:400;color:rgba(243,239,233,0.85);line-height:1.8;">{{DESCRIPTION}}</p>

  </div>

  <!-- 底部品牌區 -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:200px;padding:40px 80px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(201,130,26,0.3);">
    <div>
      <div style="font-family:'Noto Serif TC',serif;font-weight:700;font-size:28px;color:#F3EFE9;letter-spacing:4px;">{{brand_tagline}}</div>
      <div style="font-size:14px;color:rgba(243,239,233,0.5);letter-spacing:6px;margin-top:4px;">{{brand_name}}</div>
    </div>
    <div style="font-size:18px;color:rgba(243,239,233,0.5);">{{social_handle}}</div>
  </div>

</div>
</body>
</html>
