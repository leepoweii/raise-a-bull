<h1 class="page-title">Credentials</h1>

<div x-data="credentialsPage()" x-init="load()">
    <div style="margin-bottom:16px">
        <button class="btn btn-primary" @click="showAdd = !showAdd">+ Add Key</button>
    </div>

    <div class="card" x-show="showAdd" style="margin-bottom:16px">
        <div class="card-title">New Credential</div>
        <div style="display:grid;gap:8px;max-width:500px">
            <select x-model="form.key_name" style="padding:8px">
                <option value="">Select key...</option>
                <option value="MINIMAX_API_KEY">MINIMAX_API_KEY (LLM)</option>
                <option value="SERPER_API_KEY">SERPER_API_KEY (MCP)</option>
                <option value="JINA_API_KEY">JINA_API_KEY (MCP)</option>
                <option value="TAVILY_API_KEY">TAVILY_API_KEY (MCP)</option>
                <option value="AGENTS_INFRA_API_KEY">AGENTS_INFRA_API_KEY (Infra)</option>
            </select>
            <input type="text" x-model="form.key_value" placeholder="API key value">
            <div style="display:flex;gap:8px">
                <button class="btn btn-primary btn-sm" @click="create()">Save</button>
                <button class="btn btn-secondary btn-sm" @click="test()" x-text="testing ? 'Testing...' : 'Test'"></button>
                <button class="btn btn-secondary btn-sm" @click="showAdd = false">Cancel</button>
            </div>
            <div x-show="testResult" class="mono" :style="testResult?.ok ? 'color:var(--green)' : 'color:var(--red)'"
                 x-text="testResult?.ok ? 'OK (' + testResult.latency_ms + 'ms)' : 'FAIL: ' + testResult?.error">
            </div>
        </div>
    </div>

    <div class="card">
        <table class="desktop-table">
            <thead>
                <tr><th>Key Name</th><th>Value</th><th>Service</th><th>Actions</th></tr>
            </thead>
            <tbody>
                <template x-for="cred in credentials" :key="cred.id">
                    <tr>
                        <td class="mono" x-text="cred.key_name"></td>
                        <td class="mono">
                            <span x-text="cred._revealed || cred.key_value"></span>
                            <button class="btn btn-sm btn-secondary" style="margin-left:8px"
                                    @click="reveal(cred)" x-text="cred._revealed ? 'Hide' : 'Reveal'"></button>
                        </td>
                        <td x-text="cred.service"></td>
                        <td>
                            <button class="btn btn-sm btn-danger" @click="remove(cred.id)">Delete</button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
        <div class="mobile-cards">
            <template x-for="cred in credentials" :key="cred.id">
                <div class="mobile-card">
                    <div class="mobile-card-row">
                        <span class="mobile-card-label">Key</span>
                        <span class="mono" x-text="cred.key_name"></span>
                    </div>
                    <div class="mobile-card-row">
                        <span class="mobile-card-label">Value</span>
                        <span class="mono" x-text="cred._revealed || cred.key_value"></span>
                    </div>
                    <div class="mobile-card-row">
                        <span class="mobile-card-label">Service</span>
                        <span x-text="cred.service"></span>
                    </div>
                    <div class="mobile-card-actions">
                        <button class="btn btn-secondary btn-sm" @click="reveal(cred)"
                                x-text="cred._revealed ? 'Hide' : 'Reveal'"></button>
                        <button class="btn btn-danger btn-sm" @click="remove(cred.id)">Delete</button>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <div class="card" style="margin-top:16px;background:var(--yellow);color:#000">
        <strong>Note:</strong> Credential changes require container restart to take effect.
        <code class="mono">docker compose restart</code>
    </div>
</div>
